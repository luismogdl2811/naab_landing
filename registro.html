<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registra tu dije — NAAB</title>
<meta name="description" content="Registra tu pieza NAAB y genera tu carta personal: tu signo, tu elemento, tu arquetipo y tu piedra.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
--carbon:#14110c;
--carbon-suave:#1d1913;
--dorado:#c4a055;
--dorado-profundo:#8f7434;
--marfil:#f6f0e3;
--arena:#eae0cc;
--tinta:#2b2620;
--tinta-suave:#5c5344;
--terracota:#a9603f;
--serif:'Fraunces',serif;
--sans:'Jost',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:var(--sans);font-weight:300;color:var(--tinta);background:var(--marfil);line-height:1.7;font-size:17px}

.contenedor{max-width:1080px;margin:0 auto;padding:0 24px}
.eyebrow{font-size:12px;letter-spacing:.32em;text-transform:uppercase;color:var(--dorado-profundo);font-weight:400}
h1,h2,h3{font-family:var(--serif);font-weight:400;line-height:1.15}
section{padding:104px 0}
.seccion-titulo{font-size:clamp(30px,4vw,44px);margin:18px 0 26px}
.fondo-arena{background:var(--arena)}

/* Nav simple */
.nav-simple{background:var(--carbon);color:var(--marfil);padding:24px 0}
.nav-simple .contenedor{display:flex;justify-content:space-between;align-items:center}
.wordmark{font-family:var(--serif);font-weight:400;font-size:22px;letter-spacing:.42em;color:var(--dorado);text-decoration:none}
.nav-simple a.enlace{color:var(--marfil);text-decoration:none;font-size:14px;letter-spacing:.14em;text-transform:uppercase;opacity:.75;transition:opacity .3s}
.nav-simple a.enlace:hover,.nav-simple a.enlace:focus-visible{opacity:1}

/* Registro de dije */
.registro-form{max-width:520px;margin:44px auto 0;text-align:left}
.campo{margin-bottom:20px}
.campo label{display:block;font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--tinta-suave);margin-bottom:8px}
.campo input{width:100%;font-family:var(--sans);font-size:16px;padding:14px 16px;background:var(--marfil);border:1px solid rgba(43,38,32,.2);color:var(--tinta);letter-spacing:.01em}
.campo input:focus-visible{outline:none;border-color:var(--terracota)}
.fila-campos{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media (max-width:560px){.fila-campos{grid-template-columns:1fr}}
.esencia-toggle{display:flex;gap:8px}
.esencia-btn{flex:1;padding:14px;border:1px solid rgba(43,38,32,.2);background:var(--marfil);font-family:var(--sans);font-size:14px;color:var(--tinta-suave);cursor:pointer;transition:all .2s ease}
.esencia-btn.activa{border-color:var(--terracota);background:var(--terracota);color:var(--marfil)}
.boton-registro{width:100%;margin-top:6px;padding:16px;border:none;background:var(--carbon);color:var(--marfil);font-family:var(--sans);font-size:14px;letter-spacing:.18em;text-transform:uppercase;cursor:pointer;transition:background .3s}
.boton-registro:hover{background:var(--terracota)}
.boton-registro:disabled{opacity:.5;cursor:not-allowed}
.registro-msg{margin-top:16px;padding:14px 16px;font-size:14px;line-height:1.5;border-left:2px solid var(--terracota)}
.registro-msg.err{border-color:#a93b2a;color:#a93b2a}
.registro-msg.ok{border-color:var(--dorado-profundo);color:var(--tinta)}

.carta{margin-top:48px;border:1px solid rgba(43,38,32,.16);background:var(--marfil)}
.carta-hero{background:var(--carbon);color:var(--marfil);padding:48px 40px 38px;text-align:center}
.carta-hero svg{width:52px;margin:0 auto 18px;display:block;color:var(--dorado)}
.carta-hero .carta-nombre{font-family:var(--serif);font-size:28px;margin-bottom:8px}
.carta-hero .carta-meta{font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:rgba(246,240,227,.6)}
.carta-cuerpo{padding:8px 40px 8px}
.carta-bloque{padding:28px 0;border-bottom:1px solid rgba(43,38,32,.14)}
.carta-bloque:last-child{border-bottom:none}
.carta-bloque .eyebrow{margin-bottom:6px}
.carta-bloque.eleccion .eyebrow{color:var(--terracota)}
.carta-bloque h3{font-size:21px;margin-bottom:10px}
.carta-bloque p{font-size:16px;line-height:1.75;color:var(--tinta)}
.carta-acciones{padding:8px 40px 40px;display:flex;gap:10px;flex-wrap:wrap}
.accion-btn{padding:13px 22px;font-size:13px;letter-spacing:.06em;text-transform:uppercase;text-decoration:none;color:var(--tinta);border:1px solid rgba(43,38,32,.2);cursor:pointer;background:transparent;font-family:var(--sans)}
.accion-btn.primaria{background:var(--carbon);color:var(--marfil);border-color:var(--carbon)}
.accion-btn:hover{opacity:.8}

footer{background:var(--carbon);color:rgba(246,240,227,.55);padding:44px 0;border-top:1px solid rgba(246,240,227,.1)}
.footer-fila{display:flex;justify-content:space-between;align-items:center;gap:20px;flex-wrap:wrap;font-size:14px;letter-spacing:.06em}
.footer-fila a{color:rgba(246,240,227,.7);text-decoration:none}
.footer-fila a:hover{color:var(--dorado)}

@media print{
body *{visibility:hidden}
.carta,.carta *{visibility:visible}
.carta{position:absolute;top:0;left:0;width:100%;border:none}
.carta-acciones{display:none}
}
</style>
</head>
<body>

<nav class="nav-simple">
<div class="contenedor">
<a class="wordmark" href="index.html">NAAB</a>
<a class="enlace" href="index.html">Volver al inicio</a>
</div>
</nav>

<section class="fondo-arena" id="registro">
<div class="contenedor">
<div style="text-align:center">
<p class="eyebrow">Tu pieza sabe quién eres</p>
<h2 class="seccion-titulo">Registra tu dije</h2>
<p style="max-width:46ch;margin:0 auto;color:var(--tinta-suave)">Con el código de tu pieza y tu fecha de nacimiento generamos tu carta personal: tu signo, tu elemento, tu arquetipo y tu piedra.</p>
</div>

<form class="registro-form" id="forma-registro" novalidate>
<div class="campo">
<label for="r-codigo">Código de tu pieza</label>
<input type="text" id="r-codigo" name="codigo" placeholder="NAAB-ONX-0001" autocomplete="off" required>
</div>
<div class="fila-campos">
<div class="campo">
<label for="r-nombre">Nombre</label>
<input type="text" id="r-nombre" name="nombre" placeholder="Tu nombre" required>
</div>
<div class="campo">
<label for="r-apellidos">Apellidos</label>
<input type="text" id="r-apellidos" name="apellidos" placeholder="Tus apellidos" required>
</div>
</div>
<div class="fila-campos">
<div class="campo">
<label for="r-fecha">Fecha de nacimiento</label>
<input type="date" id="r-fecha" name="fecha" required>
</div>
<div class="campo">
<label>Esencia</label>
<div class="esencia-toggle">
<button type="button" class="esencia-btn activa" data-esencia="femenina">Femenina</button>
<button type="button" class="esencia-btn" data-esencia="masculina">Masculina</button>
</div>
</div>
</div>
<div class="fila-campos">
<div class="campo">
<label for="r-correo">Correo electrónico</label>
<input type="email" id="r-correo" name="correo" placeholder="tu@correo.com" required>
</div>
<div class="campo">
<label for="r-telefono">Teléfono</label>
<input type="tel" id="r-telefono" name="telefono" placeholder="33 1234 5678" required>
</div>
</div>
<button type="submit" class="boton-registro" id="r-submit">Generar mi carta</button>
<div id="r-msg" class="registro-msg" hidden></div>
</form>

<div id="r-carta"></div>
</div>
</section>

<footer>
<div class="contenedor footer-fila">
<span class="wordmark" style="font-size:17px">NAAB</span>
<span>Centro · Origen · Conexión</span>
<span><a href="index.html">Volver al inicio</a></span>
</div>
</footer>

<script>

function dibujarTorus(id, n, rx, ry){
var svg = document.getElementById(id);
if(!svg) return;
var ns = 'http://www.w3.org/2000/svg';
for(var i = 0; i < n; i++){
var e = document.createElementNS(ns, 'ellipse');
e.setAttribute('cx', 0); e.setAttribute('cy', 0);
e.setAttribute('rx', rx); e.setAttribute('ry', ry);
e.setAttribute('transform', 'rotate(' + (i * 180 / n) + ')');
svg.appendChild(e);
}
var c = document.createElementNS(ns, 'circle');
c.setAttribute('cx', 0); c.setAttribute('cy', 0); c.setAttribute('r', ry * 0.9);
svg.appendChild(c);
}

/* ============ Registro de dije: motor de carta NAAB ============ */
(function(){
  var NAAB_DATA = {"meta": {"sistema": "Carta NAAB", "version": "1.1", "fecha": "2026-07-18", "total_bloques": 80, "descripcion": "Base de datos de bloques de texto para la generación de cartas personalizadas NAAB. La carta se compone de: número (numerología), signo solar, elemento (según esencia), arquetipo (según esencia), cuarzo de nacimiento (correspondencia) y, si aplica, cuarzo elegido (elección).", "reglas": {"numero": "Sumar día+mes+año dígito a dígito hasta número simple. Respetar números maestros 11, 22, 33 sin reducir.", "signo": "Determinado por día y mes de nacimiento.", "elemento": "El elemento real del signo, en versión masculina o femenina según la esencia de la persona.", "arquetipo": "Determinado por signo + esencia (masculina/femenina).", "cuarzo_correspondencia": "Fijo por signo solar. Siempre aparece en la carta.", "cuarzo_eleccion": "Solo aparece si la persona registró un cuarzo distinto al de su signo. Se muestra después del bloque de correspondencia.", "transicion_raiz": "En los bloques de elección, el marcador {raiz} se sustituye por la frase de transiciones_raiz correspondiente al cuarzo DE NACIMIENTO de la persona (no al elegido). Ej.: Tauro que elige Ágata → «Tu signo te dio la semilla, pero tu voluntad pidió integración.»"}}, "signos_fechas": {"aries": "21 marzo – 19 abril", "tauro": "20 abril – 20 mayo", "geminis": "21 mayo – 20 junio", "cancer": "21 junio – 22 julio", "leo": "23 julio – 22 agosto", "virgo": "23 agosto – 22 septiembre", "libra": "23 septiembre – 22 octubre", "escorpio": "23 octubre – 21 noviembre", "sagitario": "22 noviembre – 21 diciembre", "capricornio": "22 diciembre – 19 enero", "acuario": "20 enero – 18 febrero", "piscis": "19 febrero – 20 marzo"}, "signo_elemento": {"aries": "fuego", "leo": "fuego", "sagitario": "fuego", "tauro": "tierra", "virgo": "tierra", "capricornio": "tierra", "geminis": "aire", "libra": "aire", "acuario": "aire", "cancer": "agua", "escorpio": "agua", "piscis": "agua"}, "signo_cuarzo": {"aries": "cuarzo_rojo", "tauro": "aventurina", "geminis": "agata", "cancer": "cuarzo_lechoso", "leo": "ojo_de_tigre", "virgo": "jaspe", "libra": "cuarzo_rosa", "escorpio": "cuarzo_ahumado", "sagitario": "aventurina_azul", "capricornio": "onix", "acuario": "amatista", "piscis": "cristal_de_roca"}, "numeros": {"1": {"titulo": "El Inicio", "texto": "Naciste bajo el número del comienzo absoluto. El 1 es la chispa antes de que haya camino, la decisión de existir de forma única e irrepetible. Quienes llevan este número son los primeros — no porque lleguen antes que otros, sino porque en su interior habita la voluntad de crear desde la nada. El 1 no espera permiso: abre la puerta que otros ni sabían que existía. Tu alma vino a este ciclo a inaugurar algo, a atreverte donde otros dudan, a ser el origen de tu propia historia. No eres seguidor: eres quien traza el camino por primera vez."}, "2": {"titulo": "El Vínculo", "texto": "Naciste bajo el número del equilibrio y la relación. El 2 es la dualidad hecha sabiduría: no es conflicto, es diálogo. Mientras el 1 crea desde la soledad, el 2 comprende que nada existe aislado — todo es espejo, todo es encuentro. Quienes llevan este número sienten profundamente la conexión entre seres, entre opuestos, entre lo que parece separado. Tu don es ver el puente donde otros ven el abismo. En este ciclo vienes a aprender que la fuerza no está en dominar, sino en sostener el equilibrio: entre dar y recibir, entre el yo y el otro, entre lo que cede y lo que resiste."}, "3": {"titulo": "La Expresión", "texto": "Naciste bajo el número de la creatividad y la comunicación. El 3 es la voz que sale del silencio, el color que nace del blanco y negro, la canción que nadie pidió pero todos necesitaban escuchar. Quienes llevan este número no pueden evitar crear — pueden ser artistas, sanadores, comunicadores, pero siempre están tejiendo algo: historias, conexiones, belleza. El 3 es el optimismo encarnado, la fe de que lo que se expresa tiene poder. Tu misión en este ciclo es dejar que tu voz salga sin miedo, que tu creatividad fluya sin censura, que entiendas que el mundo necesita exactamente lo que solo tú tienes para dar."}, "4": {"titulo": "La Estructura", "texto": "Naciste bajo el número del orden y la construcción. El 4 es los cimientos, el plano, la disciplina que sostiene las cosas. Mientras el 3 crea, el 4 edifica para que lo creado perdure. Quienes llevan este número comprenden que nada importante se improvisa — todo requiere método, paciencia, las manos en la tierra. El 4 no es aburrimiento: es la maestría silenciosa de quien sabe que los grandes proyectos requieren trabajo constante y estructura. Tu alma vino a aprender que la libertad verdadera no está en hacer lo que quieres en el momento, sino en construir las condiciones para que florezca lo que importa."}, "5": {"titulo": "La Libertad", "texto": "Naciste bajo el número del cambio y la expansión. El 5 es la brújula sin destino fijo, el viajero que cambia de ciudad porque sí, el explorador de lo desconocido. Quienes llevan este número sienten que el mundo es demasiado grande para quedarse quieto — necesitan experimentar, probar, sentir, vivir múltiples vidas en una sola. El 5 es curiosidad hecha persona, adaptabilidad, la capacidad de reinventarse sin perder la esencia. En este ciclo vienes a aprender que la verdadera libertad no es la ausencia de límites, sino saber cuándo partir y cuándo quedarte, cuándo cambiar y cuándo profundizar."}, "6": {"titulo": "El Servicio", "texto": "Naciste bajo el número de la responsabilidad y el cuidado. El 6 es quien ve que algo necesita hacerse y simplemente lo hace, sin esperar reconocimiento. Quienes llevan este número sienten una llamada interior a servir, a sanar, a sostener a quienes aman. El 6 es el maestro que no necesita ser pedido, el sanador que cura aunque nadie lo vea, la brújula moral que siempre sabe qué es lo correcto. Tu don es la capacidad de ver lo que otros necesitan antes de que lo pidan. En este ciclo tu tarea es aprender que servir no significa abandonarte, que cuidar a otros y honrarte a ti mismo pueden ser el mismo acto."}, "7": {"titulo": "La Verdad", "texto": "Naciste bajo el número de la búsqueda y la sabiduría. El 7 es el místico, el filósofo, el que hace preguntas que otros ni se atreverían a formular. Quienes llevan este número sienten una sed profunda de entender — no les satisface la superficie, necesitan descender a las raíces, tocar lo invisible, comprender los misterios. El 7 es introspección, meditación, la voz interior que habla en el silencio. Tu alma vino a este ciclo a desarrollar tu brújula interior, a confiar en tu intuición, a descubrir que la verdad no se encuentra afuera sino en el pozo más profundo de ti mismo."}, "8": {"titulo": "El Poder", "texto": "Naciste bajo el número de la manifestación y la abundancia. El 8 es quien toma lo que sueña y lo convierte en realidad tangible — dinero, influencia, dominio del mundo material. Quienes llevan este número tienen una relación especial con el poder: pueden acumularlo, transformarlo, compartirlo. El 8 no teme el éxito ni la riqueza — comprende que son herramientas. Tu don es la capacidad de materializar, de liderar con autoridad, de crear sistemas que funcionan. En este ciclo tu tarea es aprender que el poder sin sabiduría se convierte en tiranía, pero el poder con corazón se convierte en legado."}, "9": {"titulo": "La Culminación", "texto": "Naciste bajo el número de la culminación y la totalidad. El 9 no es un final en el sentido de clausura, sino de plenitud — el momento en que todas las lecciones de los ciclos anteriores se integran en sabiduría. Quienes llevan este número no están aquí para empezar caminos, sino para completarlos: llegan a cerrar círculos que otros dejaron abiertos, a perdonar lo que parecía imperdonable, a ver el cuadro completo donde otros solo ven fragmentos. Tu alma es vieja en el mejor sentido: ya sabe cómo terminan las historias, y aun así elige amarlas. Tu misión es comprender que el cierre es también un nuevo comienzo."}, "11": {"titulo": "El Iluminado", "texto": "Naciste bajo el primer número maestro, el de la intuición elevada y la visión superior. El 11 es el visionario, el que ve más allá de lo visible, el canal por donde fluye la inspiración colectiva. Quienes llevan este número tienen antenas especiales para captar lo que viene, lo que el mundo necesita saber, las verdades que aún no han sido dichas. El 11 es sensibilidad extrema, clarividencia, la capacidad de traducir lo invisible en forma. Tu don es ser puente entre mundos — entre lo material y lo espiritual, entre el individuo y la colectividad. En este ciclo tu tarea es aprender a sostener esa sensibilidad sin que te queme, a canalizar esa visión sin perder los pies en la tierra."}, "22": {"titulo": "El Constructor Maestro", "texto": "Naciste bajo el segundo número maestro, el de la materialización sagrada. El 22 es quien toma la visión del 11 y la edifica en el mundo — no es soñador, es arquitecto de lo grande. Quienes llevan este número tienen la rara capacidad de construir legados que trascienden generaciones: imperios espirituales, movimientos sociales, estructuras que perduran. El 22 es maestría en acción, la unión de visión y trabajo implacable, la fe de quien sabe que sus manos construyen el futuro. Tu don es la capacidad de materializar lo que parece imposible. En este ciclo tu tarea es comprender que el legado verdadero no es lo que acumulas, sino lo que siembras para que otros cosechen."}, "33": {"titulo": "El Sanador Maestro", "texto": "Naciste bajo el tercer número maestro, el del amor universal y la compasión infinita. El 33 es rarísimo — aparece solo en fechas muy específicas — y quienes lo llevan vienen con una misión de sanación colectiva. El 33 es quien ve el sufrimiento del mundo y no puede mirar para otro lado: sana porque no tiene opción, ama porque su corazón ya no sabe hacer otra cosa. Quienes llevan este número portan una vibración de paz profunda y comprensión sin límites. Tu don es la capacidad de amar sin condiciones, de sanar sin juzgar, de ver la divinidad en cada ser. En este ciclo tu tarea es aprender que tu propia sanación es el acto más revolucionario que puedes hacer por el mundo."}}, "signos": {"aries": {"nombre": "Aries", "texto": "Naciste en el umbral de la primavera, cuando la naturaleza despierta con urgencia y el fuego arde sin pedir permiso. Aries es el signo del comienzo, del impulso, de quien no puede esperar porque siente que la vida está sucediendo ahora. Los nacidos bajo este signo son pioneros por naturaleza — no exploran el camino porque sea seguro, sino porque nadie más se atreve. Tu temperamento es directo, apasionado, honesto hasta la rudeza. No sabes de diplomacias ni de rodeos: si algo necesita decirse, lo dices. En ti habita un guerrero que despierta cada mañana listo para la batalla, sea contra el mundo o contra sus propios límites. Tu don es la valentía de comenzar. Tu lección es aprender que no todo se conquista con ímpetu — a veces la verdadera victoria es la paciencia."}, "tauro": {"nombre": "Tauro", "texto": "Naciste cuando la primavera se asienta y el mundo comienza a solidificarse. Tauro es el signo de la estabilidad, del valor, de quien construye imperios con paciencia infinita. Los nacidos bajo este signo comprenden el mundo a través de los sentidos — necesitan tocar, probar, sentir para creer. Eres terco, sí, pero esa terquedad es tu fortaleza: no te mueves sin razón, y cuando te mueves, nada te detiene. Tu relación con el dinero, la comida, el placer, es sagrada — no porque seas materialista, sino porque entiendes que lo físico es la expresión más honesta de la existencia. En ti habita un constructor que sabe que todo lo duradero requiere tiempo. Tu don es la capacidad de crear abundancia. Tu lección es aprender que soltar también es una forma de abundancia."}, "geminis": {"nombre": "Géminis", "texto": "Naciste bajo el signo de la comunicación y la multiplicidad. Géminis es el viajero mental, el que nunca puede quedarse en un solo pensamiento porque su mente es un mercado bullicioso donde circulan mil ideas simultáneamente. Los nacidos bajo este signo son curiosos extremos — necesitan saber, preguntar, conectar puntos que otros ni ven. Tu don es la capacidad de ver desde múltiples perspectivas, de traducir lo complejo en palabras simples, de ser puente entre lenguajes y mundos. Eres ágil, ingenioso, adaptas tu comunicación a cada persona porque intuyes qué necesitan escuchar. En ti habita un mensajero que no descansa hasta que la verdad es comprendida. Tu lección es aprender que profundidad y amplitud pueden coexistir, que conocer muchas cosas no es lo mismo que entender una verdaderamente."}, "cancer": {"nombre": "Cáncer", "texto": "Naciste bajo el signo del agua emocional y la protección del hogar. Cáncer es quien siente todo — no tienes filtro entre el mundo y tu corazón, lo que toca a otros te toca a ti primero. Los nacidos bajo este signo son guardianes natos: proteges a quienes amas con la ferocidad de una madre, pero también necesitas ser protegido, necesitas sentir que hay un lugar donde eres seguro. Tu sensibilidad no es debilidad: es el don de percibir lo invisible, de saber qué necesita cada ser antes de que lo pida. En ti habita una brújula emocional que nunca falla. Tu temperamento es lunar — cambias, fluyes, no eres el mismo al amanecer que al anochecer. Tu lección es aprender que tu sensibilidad es tu superpoder, no tu maldición."}, "leo": {"nombre": "Leo", "texto": "Naciste cuando el verano alcanza su pico, cuando el sol es más fuerte y la vida explota en color. Leo es el signo del corazón, de quien necesita brillar no por vanidad sino porque llevar su luz escondida sería traición a sí mismo. Los nacidos bajo este signo son creadores, líderes, seres que inspiran simplemente existiendo. Tu generosidad es legendaria — das sin contar, amas sin medida, porque tu corazón es tan grande que no sabe hacer otra cosa. Necesitas ser visto, sí, pero no para alimentar el ego: necesitas que alguien reconozca la belleza que viste en el mundo y que reflejaste. En ti habita un rey o reina que no necesita corona porque su presencia ya lo dice todo. Tu lección es aprender que el verdadero liderazgo es servicio, que brillar no significa eclipsar a otros."}, "virgo": {"nombre": "Virgo", "texto": "Naciste bajo el signo del refinamiento y la maestría. Virgo es el artesano, el que ve los detalles donde otros ven el cuadro completo, y entiende que los detalles son lo que hace que algo sea hermoso o funcione. Los nacidos bajo este signo tienen una relación casi obsesiva con la perfección — no porque sean vanidosos, sino porque creen que todo merece ser hecho bien. Tu mente analítica es tu fortaleza y a veces tu carga: ves los problemas antes de que ocurran, prevés las soluciones, criticas porque sabes que se puede hacer mejor. En ti habita un sanador silencioso que trabaja en los detalles para que el todo brille. Tu temperamento es servicial, práctico, tierra firme. Tu lección es aprender que la perfección no existe, y que lo suficientemente bueno hecho con amor es infinitamente más valioso que lo perfecto hecho sin él."}, "libra": {"nombre": "Libra", "texto": "Naciste bajo el signo del equilibrio y la belleza. Libra es quien ve ambos lados de la moneda, quien no puede tomar decisiones porque entiende que cada opción tiene su mérito. Los nacidos bajo este signo son diplomáticos por naturaleza — buscas la armonía, odias el conflicto, tienes el don de ver lo mejor en cada persona y traerlo a la superficie. Tu relación con la belleza, el arte, la estética, es sagrada — no porque seas superficial, sino porque entiendes que la belleza es una expresión de la verdad. En ti habita un mediador que conoce el arte de la negociación no porque quiera ganar, sino porque quiere que todos ganen. Tu temperamento es encantador, sociable, refinado. Tu lección es aprender que a veces la indecisión es una forma de pereza, que elegir un lado no significa traicionar al otro."}, "escorpio": {"nombre": "Escorpio", "texto": "Naciste bajo el signo del misterio y la transformación. Escorpio es profundo, intenso, psicológico — ves lo que otros no quieren ver, especialmente lo que otros no quieren ver en sí mismos. Los nacidos bajo este signo son sanadores de lo oscuro: necesitas descender a las sombras, comprender lo prohibido, tocar lo tabú para transformarlo. Tu poder es magnético — la gente se siente atraída a ti sin saber exactamente por qué, porque intuyen que comprendes cosas que otros no osan mirar. Tu lealtad es absoluta o tu rechazo es total — no hay punto medio contigo. En ti habita un alquimista que convierte el veneno en medicina. Tu temperamento es apasionado, secreto, intuitivo. Tu lección es aprender que el poder sin compasión se convierte en venganza, que transformar a otros comienza por transformarse a uno mismo."}, "sagitario": {"nombre": "Sagitario", "texto": "Naciste bajo el signo de la expansión y la búsqueda de verdad. Sagitario es el viajero, el filósofo, el que no puede quedarse en una verdad pequeña porque siente que hay universos de conocimiento esperando. Los nacidos bajo este signo son optimistas por defecto — creen que todo mejorará, que la vida es una aventura que vale la pena vivir, que siempre hay más. Tu don es la visión de largo plazo, la capacidad de ver el patrón donde otros ven caos, de mantener fe cuando otros pierden esperanza. En ti habita un arquero que apunta hacia horizontes que aún no existen. Tu temperamento es aventurero, honesto, a veces brutal en tu honestidad. Tu lección es aprender que no todo se resuelve con optimismo, que a veces la verdad es oscura y hay que habitarla antes de trascenderla."}, "capricornio": {"nombre": "Capricornio", "texto": "Naciste en el umbral del invierno, cuando la naturaleza guarda su fuerza bajo tierra para resistir. Capricornio es el signo de la perseverancia silenciosa — no es el brillo del que llega primero, sino la certeza del que llega siempre. Los nacidos bajo este signo comprenden el valor del tiempo: saben que lo que vale la pena no se improvisa, se cultiva. Tu ambición no es ruido — es raíz. Construyes lentamente, ladrillo por ladrillo, sin prisa pero sin pausa. Tu seriedad no es frialdad: es el respeto de quien sabe que toda estructura requiere cimiento. En ti habita un patriarca o matriarca que sostiene generaciones enteras. Tu temperamento es reservado, disciplinado, leal. Tu lección es aprender que el camino es tan importante como el destino, que el éxito sin alegría es solo una prisión con mejores vistas."}, "acuario": {"nombre": "Acuario", "texto": "Naciste bajo el signo de la innovación y la libertad colectiva. Acuario es el revolucionario, el que no puede vivir dentro de los límites porque siente que los límites son invenciones que alguien más hizo. Los nacidos bajo este signo piensan diferente — no porque quieran ser diferentes, sino porque su mente funciona en frecuencias que otros ni perciben. Tu don es la capacidad de ver el futuro, de imaginar sistemas que no existen aún, de conectar ideas que parecían inconexas. En ti habita un visionario que trabaja por la colectividad, no por gloria personal. Tu temperamento es impredecible, ingenioso, desapegado emocionalmente aunque profundamente humanitario. Tu lección es aprender que la libertad sin conexión es soledad, que cambiar el mundo requiere entender a las personas, no solo las ideas."}, "piscis": {"nombre": "Piscis", "texto": "Naciste bajo el signo del misterio y la disolución de límites. Piscis es el soñador, el místico, el que vive con un pie en el mundo físico y otro en reinos que solo él puede percibir. Los nacidos bajo este signo son empáticos al punto de la absorción — sienten todo lo que los rodea, los estados emocionales de otros, la energía del lugar. Tu don es la compasión infinita, la creatividad sin límites, la capacidad de ver la belleza en lo roto. En ti habita un poeta que traduce lo invisible en formas que otros pueden tocar. Tu temperamento es intuitivo, artístico, a veces confuso porque tu mente no funciona en líneas rectas. Tu lección es aprender que absorber el dolor del mundo no te ayuda a sanarlo, que tener límites es un acto de amor, no de egoísmo."}}, "elementos": {"fuego_m": {"nombre": "Fuego", "esencia": "masculina", "texto": "En ti, el Fuego se vive como la esencia masculina lo conoce: dirección, propósito, presencia que no pide permiso. Eres la chispa que enciende, el impulso que mueve montañas, la voluntad que se concentra en un punto y no se desvía. El fuego masculino no dispersa — enfoca. No calienta desde lejos — quema desde adentro hacia afuera. Tu fuerza es la de quien sabe exactamente qué quiere y se mueve hacia ello sin dudas que lo detengan. Llevas en ti la capacidad de iniciar, de liderar, de marcar el territorio. En ti habita la seguridad de quien no necesita permiso porque ya nace sabiendo adónde va. Tu presencia se siente antes de que hables. Tu lección es aprender que el fuego sin sabiduría destruye, que la verdadera fuerza no es quemar todo en tu camino sino iluminar el camino para otros."}, "fuego_f": {"nombre": "Fuego", "esencia": "femenina", "texto": "En ti, el Fuego se vive como la esencia femenina lo conoce: radiancia, magnetismo, la capacidad de atraer sin pedir. Eres la llama que danza, el calor que abraza, la energía que no necesita ser violenta para ser poderosa. El fuego femenino no conquista — atrae. No impone — irradia. Tu presencia es magnética porque no estás buscando ser vista — simplemente eres demasiado viva para pasar desapercibida. Llevas en ti la capacidad de transformar, de inspirar, de hacer que otros encuentren su propio fuego al estar cerca del tuyo. Tu fuerza es la de quien brilla sin necesidad de apagar a otros para brillar más. En ti habita la sensualidad del fuego que danza. Tu lección es aprender que atraer no significa manipular, que tu luz es lo suficientemente grande como para compartirla sin perderla."}, "tierra_m": {"nombre": "Tierra", "esencia": "masculina", "texto": "En ti, la Tierra se vive como la esencia masculina la conoce: solidez, construcción, el arte de edificar imperios que perduran. Eres las raíces que penetran profundo, la roca sobre la que otros construyen sus casas, la estabilidad que no tiembla. La tierra masculina no se dispersa — se asienta. Tu fuerza es la de quien comprende que todo lo valioso requiere tiempo, paciencia, trabajo constante. Eres el constructor, el que ve un terreno vacío y visualiza la ciudad que será. Llevas en ti la capacidad de materializar, de convertir sueños en realidad tangible, de crear estructuras que trascienden generaciones. En ti habita la paciencia de la montaña. Tu lección es aprender que la rigidez no es fortaleza, que a veces ceder es más sabio que resistir."}, "tierra_f": {"nombre": "Tierra", "esencia": "femenina", "texto": "En ti, la Tierra se vive como la esencia femenina la conoce: no como territorio que se conquista, sino como cuerpo que sostiene. Eres el suelo donde otros encuentran dónde pararse, la madre que nutre sin preguntar, la estabilidad que abraza. La tierra femenina no empuja — sostiene. Tu fuerza es la de quien comprende que la verdadera abundancia está en dar, en permitir que crezca lo que se siembra en ti. Llevas en ti la capacidad de recibir, de transformar lo que cae en ti en alimento, de hacer florecer lo que otros descartaron. En ti habita la generosidad silenciosa de la tierra que no pide nada pero lo da todo. Tu lección es aprender que sostener a otros no significa abandonarte, que tu propio crecimiento es necesario para que otros florezcan."}, "aire_m": {"nombre": "Aire", "esencia": "masculina", "texto": "En ti, el Aire se vive como la esencia masculina lo conoce: libertad de pensamiento, claridad mental, la capacidad de ver desde las alturas. Eres el viento que lleva las ideas de un lugar a otro, el que no puede ser contenido porque tu naturaleza es el movimiento. El aire masculino no se queda — viaja. Tu fuerza es la de quien puede mantener la perspectiva, quien ve el patrón donde otros ven caos, quien piensa en sistemas y soluciones. Llevas en ti la capacidad de comunicar con precisión, de cortar lo que no sirve con la claridad de una hoja de aire. En ti habita la inteligencia que no descansa. Tu lección es aprender que la libertad sin raíces es vagabundeo, que pensar no es lo mismo que sentir, y ambos son necesarios."}, "aire_f": {"nombre": "Aire", "esencia": "femenina", "texto": "En ti, el Aire se vive como la esencia femenina lo conoce: ligereza, capacidad de adaptación, la gracia de quien fluye sin resistencia. Eres la brisa que refresca, la que lleva mensajes de un corazón a otro, la conexión invisible que sostiene las cosas. El aire femenino no obstruye — facilita. Tu fuerza es la de quien puede estar en muchos lugares simultáneamente, quien ve todas las perspectivas sin quedarse atrapada en ninguna. Llevas en ti la capacidad de comunicar lo que otros no pueden expresar, de traducir emociones en palabras, de ser el puente entre mundos. En ti habita la levedad de quien no carga lo que no le pertenece. Tu lección es aprender que la adaptabilidad no es debilidad, que tener raíces en ti misma no significa perder ligereza."}, "agua_m": {"nombre": "Agua", "esencia": "masculina", "texto": "En ti, el Agua se vive como la esencia masculina la conoce: profundidad emocional, la capacidad de descender a las aguas oscuras sin perder la dirección. Eres el río que fluye con propósito, el que conoce su destino al mar aunque tome mil caminos. El agua masculina no dispersa — se concentra. Tu fuerza es la de quien puede sumergirse en las emociones propias y las de otros sin ahogarse, quien comprende lo psicológico sin quedarse atrapado en ello. Llevas en ti la capacidad de sanar, de transformar lo tóxico en medicina, de moverte con gracia a través de lo emocional. En ti habita la sabiduría del agua que siempre encuentra el camino. Tu lección es aprender que sentir profundamente no significa ser débil, que tu sensibilidad es tu superpoder cuando se une a tu voluntad."}, "agua_f": {"nombre": "Agua", "esencia": "femenina", "texto": "En ti, el Agua se vive como la esencia femenina la conoce: receptividad, la capacidad de contener todo sin ser contaminada, la sensualidad del movimiento fluido. Eres el océano que abraza, la que recibe todo lo que cae en ti y lo transforma en nutrición. El agua femenina no controla — se entrega. Tu fuerza es la de quien puede sentir todo sin quebrarse, quien comprende que la verdadera fuerza está en la flexibilidad, no en la rigidez. Llevas en ti la capacidad de amar sin límites, de sanar a través de tu presencia, de convertir el sufrimiento en compasión. En ti habita la profundidad del océano que no necesita explicar su poder. Tu lección es aprender que rendirse no es lo mismo que abandonarse, que abrir tu corazón es el acto más revolucionario que puedes hacer."}}, "arquetipos": {"aries_m": {"nombre": "El Guerrero", "signo": "aries", "esencia": "masculina", "texto": "Eres el que avanza cuando otros retroceden. El Guerrero no pelea por placer — pelea porque hay cosas que merecen ser defendidas, y él nació sabiendo cuáles son. Su esencia masculina se expresa en la dirección pura: cuando el Guerrero decide, el mundo entero se ordena detrás de esa decisión. No conoce la duda paralizante; conoce el miedo, pero lo usa como combustible. Su presencia es filo: corta la confusión, define los territorios, marca el límite entre lo que se permite y lo que no. Tu tarea como Guerrero es aprender que la batalla más importante no es contra el mundo, sino contra tu propia impaciencia — y que el guerrero maduro sabe cuándo la espada debe quedarse en su funda."}, "aries_f": {"nombre": "La Amazona", "signo": "aries", "esencia": "femenina", "texto": "Eres la que cabalga al frente sin pedir permiso. La Amazona es fuego femenino en movimiento: no espera ser rescatada porque nunca necesitó rescate. Su fuerza no imita la del hombre — es otra cosa: es la fiereza que nace del cuerpo, del instinto, de la certeza de que su vida le pertenece. La Amazona ama con la misma intensidad con la que lucha: por completo o de ninguna manera. Su radiancia no es suave — es llama viva, y quien se acerca lo sabe. Tu tarea como Amazona es aprender que la independencia no está reñida con la entrega: que abrir el corazón no es rendir el territorio, y que la guerrera más libre es la que ya no necesita demostrar que lo es."}, "tauro_m": {"nombre": "El Constructor", "signo": "tauro", "esencia": "masculina", "texto": "Eres el que convierte la visión en piedra. El Constructor no sueña con imperios — los levanta, ladrillo por ladrillo, con la paciencia de quien sabe que el tiempo es su aliado y no su enemigo. Su esencia masculina se expresa en la constancia: su dirección no es veloz, es inevitable. Donde otros abandonan, él sigue; donde otros improvisan, él cimienta. Sus manos conocen el valor de lo tangible: el pan, la casa, el abrazo, el trabajo bien hecho. Su presencia da seguridad porque es la presencia de lo que permanece. Tu tarea como Constructor es aprender que no todo lo valioso se puede poseer — que hay riquezas que solo existen cuando se sueltan, y que el edificio más importante que construirás eres tú mismo."}, "tauro_f": {"nombre": "La Madre Tierra", "signo": "tauro", "esencia": "femenina", "texto": "Eres la abundancia hecha cuerpo. La Madre Tierra no da porque le sobre — da porque dar es su naturaleza, como el árbol no decide dar fruto: simplemente fructifica. Su esencia femenina se expresa en la sensualidad más honesta: el placer de lo real, el aroma del café, la tela sobre la piel, la comida compartida. Ella sostiene sin esfuerzo aparente, nutre sin agotarse, embellece todo lo que toca porque su presencia misma es fértil. Quien descansa en ella recuerda lo que es estar en casa. Tu tarea como Madre Tierra es aprender que también tú necesitas suelo: que la que nutre a todos debe dejarse nutrir, y que recibir no te hace menos generosa — te hace sostenible."}, "geminis_m": {"nombre": "El Mensajero", "signo": "geminis", "esencia": "masculina", "texto": "Eres el que conecta los mundos. El Mensajero corre entre territorios que no se hablan entre sí y los traduce: la idea con la acción, la mente con el corazón, una persona con otra. Su esencia masculina se expresa en la precisión del pensamiento: su palabra es flecha, y cuando habla con verdad, esa flecha da en el blanco. Es ágil, rápido, imposible de encasillar — no porque huya, sino porque su función es circular. Sin mensajeros, cada mundo se quedaría encerrado en sí mismo. Tu tarea como Mensajero es aprender que no toda verdad debe decirse en el instante en que se descubre — que el mensaje más poderoso es el que llega cuando el otro está listo para escucharlo."}, "geminis_f": {"nombre": "La Pitonisa", "signo": "geminis", "esencia": "femenina", "texto": "Eres la que sabe antes de saber. La Pitonisa es la palabra femenina en su forma más antigua: la voz del oráculo, la que percibe lo que flota en el aire antes de que nadie lo nombre. Su mente es rápida como el viento, pero su don no es solo intelecto — es intuición verbal: dice la frase exacta que el otro necesitaba oír, hace la pregunta que destapa lo escondido. Su conversación es danza, juego, seducción del pensamiento. Tu tarea como Pitonisa es aprender a distinguir entre las voces que canalizas y la tuya propia — porque la que traduce a todos merece, también, ser escuchada en su propia lengua."}, "cancer_m": {"nombre": "El Guardián", "signo": "cancer", "esencia": "masculina", "texto": "Eres el que protege el fuego del hogar. El Guardián no busca gloria en la batalla lejana: su territorio sagrado es el círculo íntimo — la familia, los suyos, los que duermen tranquilos porque él vigila. Su esencia masculina se expresa en la presencia protectora: no necesita hablar fuerte para que se sepa que está. Siente profundamente, aunque no siempre lo muestre; su coraza no es frialdad, es armadura de quien sabe cuánto vale lo que cuida. Tu tarea como Guardián es aprender que proteger no es controlar: que los que amas necesitan tu confianza tanto como tu vigilancia, y que abrir tu propia coraza es el acto de valentía que tu círculo espera de ti."}, "cancer_f": {"nombre": "La Luna", "signo": "cancer", "esencia": "femenina", "texto": "Eres el ciclo hecho mujer. La Luna no se disculpa por cambiar: crece, mengua, se oculta y regresa, y en cada fase es completamente ella. Su esencia femenina se expresa en la marea emocional: siente todo, absorbe todo, y esa sensibilidad extrema es su forma de conocimiento — sabe cómo está cada ser querido con solo mirarlo. Es refugio: en su presencia, los demás se permiten sentir lo que en otro lado esconden. Su amor es el agua que envuelve sin ahogar. Tu tarea como Luna es aprender que no toda marea ajena es tuya: que puedes acompañar el dolor de otros sin cargarlo, y que tus propias fases merecen el mismo cuidado que das a las de todos."}, "leo_m": {"nombre": "El Rey Sol", "signo": "leo", "esencia": "masculina", "texto": "Eres el centro que da vida al sistema. El Rey Sol no compite por el trono — su realeza no viene del poder sobre otros, sino de la luz que emana cuando está alineado con su corazón. Su esencia masculina se expresa en la presencia radiante: entra a un lugar y el lugar cambia. Es generoso como solo puede serlo quien se sabe abundante; lidera inspirando, no imponiendo. Su corte no lo sigue por miedo: lo sigue porque cerca de él todos brillan más. Tu tarea como Rey Sol es aprender que el sol no necesita aplausos para salir cada mañana — que tu luz es real aunque nadie la celebre, y que el rey maduro ilumina también los rincones donde no hay espejos."}, "leo_f": {"nombre": "La Reina", "signo": "leo", "esencia": "femenina", "texto": "Eres la soberanía hecha carne. La Reina no pide ser tratada con honor — se trata a sí misma con honor, y el mundo simplemente sigue el ejemplo. Su esencia femenina se expresa en la radiancia plena: su belleza no es solo estética, es un estado del ser — la certeza de su propio valor irradiada en cada gesto. Ama el esplendor porque sabe que la vida merece celebrarse; su generosidad es cálida, teatral, abundante. Quien es amado por una Reina lo sabe: no hay amor a medias en su reino. Tu tarea como Reina es aprender que tu corona no depende de la mirada ajena — que sigues siendo soberana en los días grises, y que la reina más poderosa es la que puede quitarse la corona y seguir siéndolo."}, "virgo_m": {"nombre": "El Artesano", "signo": "virgo", "esencia": "masculina", "texto": "Eres el que perfecciona el mundo pieza por pieza. El Artesano no busca la gloria del cuadro completo: encuentra lo sagrado en el detalle, en el ajuste preciso, en el trabajo que nadie ve pero todos disfrutan. Su esencia masculina se expresa en la maestría: la dirección de su vida es el oficio, el pulido interminable de su arte y de sí mismo. Sirve sin servilismo — su servicio es su forma de amar. Su ojo detecta la falla no para criticar, sino porque sabe que todo puede estar mejor hecho. Tu tarea como Artesano es aprender que la obra nunca estará terminada — y que está bien: la perfección no es el destino, es la dirección. Lo imperfecto hecho con amor vale más que lo impecable hecho sin él."}, "virgo_f": {"nombre": "La Sanadora", "signo": "virgo", "esencia": "femenina", "texto": "Eres la que restaura lo que la vida desgasta. La Sanadora percibe el cuerpo, el ánimo y el detalle con una finura que parece magia pero es atención pura: nota lo que nadie nota, y por eso sana lo que nadie sabía que estaba herido. Su esencia femenina se expresa en el cuidado encarnado: sus manos, su cocina, sus rutinas, sus palabras — todo en ella ordena y alivia. No sana con grandes gestos sino con constancia amorosa: el té a tiempo, la pregunta correcta, el espacio limpio donde el alma respira. Tu tarea como Sanadora es aprender a incluirte en tu propia lista de pacientes: la que cuida los detalles de todos merece que sus propios detalles sean cuidados."}, "libra_m": {"nombre": "El Diplomático", "signo": "libra", "esencia": "masculina", "texto": "Eres el que construye puentes donde otros cavan trincheras. El Diplomático ve todos los lados de cada conflicto — no por indecisión, sino por amplitud: comprende que la verdad rara vez vive en un solo bando. Su esencia masculina se expresa en la justicia serena: su dirección es el equilibrio, y la sostiene con elegancia incluso en medio de la tormenta. Su palabra suaviza sin mentir, negocia sin traicionar. Donde él está, la mesa se vuelve redonda. Tu tarea como Diplomático es aprender que la paz no siempre se logra complaciendo: que a veces elegir un lado es el acto más justo, y que tu propia voz merece el mismo peso que das a las voces que concilias."}, "libra_f": {"nombre": "La Musa", "signo": "libra", "esencia": "femenina", "texto": "Eres la belleza que despierta la creación en otros. La Musa no fabrica el arte — lo provoca: su presencia afina el mundo, y cerca de ella los demás quieren ser mejores, más bellos, más verdaderos. Su esencia femenina se expresa en la armonía encarnada: su estética no es superficie, es filosofía — sabe que un espacio bello sana, que un gesto elegante ordena, que la gracia es una forma de sabiduría. Ama en pareja, en espejo, en danza: su naturaleza es el encuentro. Tu tarea como Musa es aprender que también eres artista y no solo inspiración: que tu propia obra merece nacer, y que la armonía que regalas al mundo empieza por la paz que haces contigo misma."}, "escorpio_m": {"nombre": "El Alquimista", "signo": "escorpio", "esencia": "masculina", "texto": "Eres el que desciende donde otros no se atreven. El Alquimista no le teme a la sombra — la estudia, la atraviesa, y regresa con oro. Su esencia masculina se expresa en la intensidad dirigida: su mirada penetra las máscaras, su voluntad sostiene procesos de transformación que quebrarían a cualquiera. No vive en la superficie: todo en él es fondo, misterio, poder contenido. Quien lo conoce de verdad ha sido invitado a un territorio que pocos pisan. Tu tarea como Alquimista es aprender que la transformación más profunda es la propia: que el poder que sabes ejercer sobre lo oculto alcanza su madurez cuando lo usas para liberarte a ti mismo — y que confiar no es perder control, es la última alquimia."}, "escorpio_f": {"nombre": "La Serpiente de Fuego", "signo": "escorpio", "esencia": "femenina", "texto": "Eres la energía vital en su forma más pura. La Serpiente de Fuego es el poder femenino que las culturas antiguas veneraban y temían: la fuerza que sube desde la raíz, que muda de piel, que muere y renace cuantas veces haga falta. Su esencia femenina se expresa en la profundidad magnética: no seduce con esfuerzo — su sola presencia toca capas que otros ni saben que tienen. Siente con una intensidad que puede asustar a los tibios; por eso su amor no es para cualquiera: es iniciación. Tu tarea como Serpiente de Fuego es aprender que tu intensidad no es demasiado: es tu naturaleza — y que quien merece caminar contigo no es quien la tolera, sino quien la honra."}, "sagitario_m": {"nombre": "El Arquero", "signo": "sagitario", "esencia": "masculina", "texto": "Eres el que apunta más allá del horizonte. El Arquero vive tensado entre la tierra que pisa y el blanco lejano que solo él ve: su esencia masculina se expresa en la visión con dirección — no vaga, apunta. Es optimista no por ingenuidad sino por convicción: ha visto suficiente mundo para saber que siempre hay más camino. Su honestidad es flecha directa — a veces hiere, pero nunca envenena. Enseña sin querer, porque su entusiasmo por la verdad es contagioso. Tu tarea como Arquero es aprender que llegar también importa: que el buscador eterno corre el riesgo de no habitar nada, y que plantar bandera en una verdad — o en un amor — no es renunciar al horizonte: es darle raíz."}, "sagitario_f": {"nombre": "La Nómada", "signo": "sagitario", "esencia": "femenina", "texto": "Eres la libertad con cuerpo de mujer. La Nómada no pertenece a los lugares — los lugares le pertenecen a ella mientras los camina. Su esencia femenina se expresa en el flujo expansivo: ríe fuerte, ama el movimiento, convierte cada viaje en historia y cada historia en fuego de campamento. Su sabiduría no viene de los libros solamente: viene de los caminos, de las personas, de haber dicho que sí cuando otros dijeron que no. Su alegría es su brújula. Tu tarea como Nómada es aprender que echar raíces no es traicionar tu naturaleza: que hay una diferencia entre huir y explorar, y que la viajera más libre es la que puede quedarse — y elige quedarse — sin sentirse atrapada."}, "capricornio_m": {"nombre": "El Patriarca de la Montaña", "signo": "capricornio", "esencia": "masculina", "texto": "Eres el que sostiene la estructura del mundo. El Patriarca de la Montaña no llegó a la cima por ambición vacía: subió porque desde arriba se cuida mejor a los que vienen atrás. Su esencia masculina se expresa en la responsabilidad asumida: su palabra es contrato, su presencia es orden, su trabajo es legado. Comprende el tiempo como pocos — sabe esperar, sabe insistir, sabe que las cumbres no se improvisan. Los suyos descansan porque él no suelta. Tu tarea como Patriarca es aprender que la montaña también merece primavera: que el deber sin alegría se vuelve piedra muerta, y que mostrarte humano — cansado, tierno, falible — no derrumba tu autoridad: la completa."}, "capricornio_f": {"nombre": "La Matriarca", "signo": "capricornio", "esencia": "femenina", "texto": "Eres la que sostiene linajes enteros. La Matriarca no asciende a la montaña — ella es la montaña: el punto fijo alrededor del cual la familia, el clan, la tribu, encuentran su centro. Su poder no viene de mandar sino de sostener: nada de lo suyo cae, porque ella es el cimiento. Su esencia femenina se expresa en la fuerza que abraza: exige porque cree, corrige porque ama, y su aprobación — escasa, verdadera — vale más que mil aplausos. Tu tarea como Matriarca es aprender que sostener a otros y soltarte a ti misma pueden ser el mismo gesto: que la que carga el linaje también tiene derecho a ser cargada, y que pedir ayuda no agrieta el cimiento — lo humaniza."}, "acuario_m": {"nombre": "El Arquitecto del Futuro", "signo": "acuario", "esencia": "masculina", "texto": "Eres el que diseña lo que aún no existe. El Arquitecto del Futuro vive adelantado: ve los sistemas que vendrán, las formas nuevas de vivir, las estructuras que reemplazarán a las que ya crujen. Su esencia masculina se expresa en la visión estructural: no sueña disperso — diseña. Su mente es su territorio y su herramienta; su desapego no es frialdad, es perspectiva. Trabaja para la colectividad incluso cuando la colectividad aún no lo entiende. Tu tarea como Arquitecto es aprender que el futuro se construye con personas, no solo con ideas: que bajar de la torre de diseño a la calle — al abrazo, al desorden humano — no interrumpe tu obra: es tu obra."}, "acuario_f": {"nombre": "La Hechicera", "signo": "acuario", "esencia": "femenina", "texto": "Eres la que no cabe en ningún molde — y por eso los rompe. La Hechicera es la mujer que las épocas rígidas llamaron rara y las épocas sabias llamaron adelantada: piensa distinto, ama distinto, vive distinto, y su diferencia es su magia. Su esencia femenina se expresa en la libertad radiante: no busca encajar — busca ser verdadera, y esa autenticidad libera a quienes la rodean. Su intuición conecta puntos invisibles; sus visiones llegan antes que las noticias. Tu tarea como Hechicera es aprender que ser distinta no te condena a estar sola: que existe tu tribu — los que aman tu rareza sin domesticarla — y que dejarte encontrar también es un acto de magia."}, "piscis_m": {"nombre": "El Místico", "signo": "piscis", "esencia": "masculina", "texto": "Eres el que camina entre los dos mundos. El Místico tiene un pie en lo cotidiano y otro en lo invisible: percibe lo que flota detrás de las formas, lo que las palabras no alcanzan. Su esencia masculina se expresa en la presencia contemplativa: su dirección no apunta hacia afuera sino hacia lo profundo — medita, crea, ora, sueña, y desde ese fondo trae belleza y comprensión para todos. Su compasión no es teoría: siente el dolor ajeno como propio. Tu tarea como Místico es aprender a habitar también este mundo: que encarnar — trabajar, amar, comprometerte con lo concreto — no traiciona tu espíritu: lo ancla, y que el puente entre los mundos solo sirve si toca ambas orillas."}, "piscis_f": {"nombre": "La Sirena", "signo": "piscis", "esencia": "femenina", "texto": "Eres el misterio del océano hecho canto. La Sirena vive en las aguas profundas de la emoción y el sueño: su esencia femenina se expresa en la entrega total — ama sin reservas, siente sin filtros, crea desde un lugar que no tiene mapa. Su arte, su ternura y su intuición vienen del mismo fondo: un océano interior donde caben todas las mareas. Quien la escucha cantar — es decir, quien la ve ser plenamente ella — no la olvida jamás. Tu tarea como Sirena es aprender a no disolverte en las aguas de otros: que la empatía sin orillas se vuelve naufragio, y que puedes amar con toda tu profundidad sin dejar de ser tuya — porque tu canto solo existe si tú existes."}}, "cuarzos_correspondencia": {"cuarzo_rojo": {"nombre": "Cuarzo Rojo / Cornalina", "signo": "aries", "texto": "Tu piedra es el Cuarzo Rojo — la piedra de la sangre valiente. Desde la antigüedad, los guerreros la llevaban al combate como talismán de coraje y vitalidad: se creía que despertaba la fuerza dormida y encendía la voluntad de vivir. Es una piedra que no susurra — enciende: activa el cuerpo, empuja a la acción, recuerda que la vida es ahora. No podía ser otra tu piedra: naciste bajo el fuego del comienzo, y tu cuarzo es brasa. Llevarla cerca del corazón es un recordatorio de tu naturaleza: el fuego que te habita no está ahí para consumirte, sino para iluminar el camino que solo tú te atreves a abrir."}, "aventurina": {"nombre": "Cuarzo Verde / Aventurina", "signo": "tauro", "texto": "Tu piedra es la Aventurina — la piedra de la abundancia serena. Desde la antigüedad se le asocia con la prosperidad, el crecimiento y la fortuna que llega a quien cultiva con paciencia: los antiguos la llamaban la piedra de la oportunidad. Su verde es el verde de lo que crece sin prisa — el bosque, el campo fértil, lo que da fruto porque tuvo raíz. No podía ser otra tu piedra: naciste bajo el signo del constructor, y tu cuarzo es semilla. Llevarla cerca del corazón es un recordatorio de tu naturaleza: la abundancia verdadera no es la que se acumula, sino la que florece — y todo lo que tocas con paciencia, florece."}, "agata": {"nombre": "Ágata", "signo": "geminis", "texto": "Tu piedra es el Ágata — la piedra de las mil capas. Formada por bandas concéntricas que se depositaron una sobre otra durante milenios, el ágata es diversidad hecha piedra: no hay dos iguales, como no hay dos pensamientos tuyos idénticos. Desde la antigüedad se le asocia con el equilibrio de la mente, la claridad en la palabra y la armonía entre los opuestos internos. No podía ser otra tu piedra: naciste bajo el signo de la multiplicidad, y tu cuarzo tiene tantas voces como tú. Llevarla cerca del corazón es un recordatorio de tu naturaleza: tus múltiples facetas no son dispersión — son riqueza, capas de un mismo ser que sigue formándose."}, "cuarzo_lechoso": {"nombre": "Cuarzo Lechoso", "signo": "cancer", "texto": "Tu piedra es el Cuarzo Lechoso — la piedra de la luz suave. Su blancura no es transparencia ni opacidad: es bruma, como la luz de la luna sobre el agua. Desde la antigüedad se le asocia con la calma, la protección del hogar y la nutrición del alma: es la piedra de las madres, de los refugios, de lo que envuelve sin apretar. No podía ser otra tu piedra: naciste bajo el signo del guardián y la luna, y tu cuarzo es abrazo. Llevarla cerca del corazón es un recordatorio de tu naturaleza: tu sensibilidad no es fragilidad — es la luz tenue que hace que otros se sientan, por fin, en casa."}, "ojo_de_tigre": {"nombre": "Ojo de Tigre", "signo": "leo", "texto": "Tu piedra es el Ojo de Tigre — la piedra de la mirada dorada. Sus bandas de oro y sombra atrapan la luz y la devuelven en destellos, como el sol atravesando la melena de un felino. Desde la antigüedad se le asocia con el coraje, la confianza y la protección de los que caminan al frente: los guerreros la llevaban para ver con claridad y actuar con nobleza. No podía ser otra tu piedra: naciste bajo el signo del sol, y tu cuarzo brilla como tú — desde adentro. Llevarla cerca del corazón es un recordatorio de tu naturaleza: tu luz no necesita testigos para ser real, pero el mundo es más cálido cuando decides no esconderla."}, "jaspe": {"nombre": "Jaspe", "signo": "virgo", "texto": "Tu piedra es el Jaspe — la piedra del cuidado terrenal. Los antiguos la llamaban la nutridora suprema: piedra de sanadores, de parteras, de quienes sostienen los procesos lentos de la vida. Su fuerza no es espectacular — es constante: estabiliza, acompaña, ordena lo disperso. Cada jaspe lleva en su interior paisajes minerales únicos, como si la tierra hubiera pintado en él sus detalles más finos. No podía ser otra tu piedra: naciste bajo el signo del artesano y la sanadora, y tu cuarzo trabaja como tú — en silencio, con precisión, sin pedir aplauso. Llevarla cerca del corazón es un recordatorio de tu naturaleza: el amor está en los detalles, y tú eres quien los ve."}, "cuarzo_rosa": {"nombre": "Cuarzo Rosa", "signo": "libra", "texto": "Tu piedra es el Cuarzo Rosa — la piedra del corazón abierto. Desde la antigüedad se le asocia con el amor en todas sus formas: el que se da, el que se recibe, y el más difícil — el que se tiene uno mismo. Su rosa pálido no grita: envuelve, suaviza, reconcilia. Es la piedra de la armonía en los vínculos, de la belleza que sana, de la paz que se construye con ternura. No podía ser otra tu piedra: naciste bajo el signo del equilibrio y la belleza, y tu cuarzo es tratado de paz. Llevarla cerca del corazón es un recordatorio de tu naturaleza: la armonía que regalas al mundo merece empezar por ti — también contigo la balanza debe ser justa."}, "cuarzo_ahumado": {"nombre": "Cuarzo Ahumado", "signo": "escorpio", "texto": "Tu piedra es el Cuarzo Ahumado — la piedra de la sombra transmutada. Su humo interior no es mancha: es memoria — la huella de la tierra profunda y su fuego atravesando el cristal sin quebrarlo. Desde la antigüedad se le asocia con la protección, el anclaje y la transformación de lo denso en liviano: es la piedra de los que atraviesan la oscuridad y regresan. No podía ser otra tu piedra: naciste bajo el signo del alquimista, y tu cuarzo, como tú, convirtió su sombra en belleza. Llevarla cerca del corazón es un recordatorio de tu naturaleza: no hay profundidad que te destruya — todo lo que desciendes, lo transformas."}, "aventurina_azul": {"nombre": "Aventurina Azul", "signo": "sagitario", "texto": "Tu piedra es la Aventurina Azul — la piedra del horizonte. Su azul es el del cielo abierto visto desde la cima: promesa de distancia, invitación al viaje. Desde la antigüedad, las piedras azules se asocian con la verdad, la visión amplia y la comunicación honesta — cualidades del que apunta lejos y habla claro. Es piedra de expansión serena: calma la mente sin apagar el fuego. No podía ser otra tu piedra: naciste bajo el signo del arquero, y tu cuarzo es cielo por recorrer. Llevarla cerca del corazón es un recordatorio de tu naturaleza: el horizonte no es un lugar al que se llega — es la dirección en la que eliges vivir."}, "onix": {"nombre": "Ónix", "signo": "capricornio", "texto": "Tu piedra es el Ónix — la piedra negra de la fortaleza serena. Desde la antigüedad se le asocia con la protección, el anclaje y la resistencia silenciosa: absorbe lo que pesa para que tú no lo cargues. No es una piedra que brilla hacia afuera; es una piedra que sostiene hacia adentro — como tú. No podía ser otra tu piedra: naciste bajo el signo de la montaña, y tu cuarzo es cimiento. Llevarla cerca del corazón es un recordatorio de tu naturaleza: la fuerza más profunda no es la que se ve, sino la que sostiene todo lo que se ve."}, "amatista": {"nombre": "Amatista", "signo": "acuario", "texto": "Tu piedra es la Amatista — la piedra de la mente elevada. Su violeta fue durante siglos el color de lo sagrado y lo visionario: los antiguos creían que protegía la claridad de la conciencia y abría la percepción hacia lo que aún no tiene forma. Es la piedra de los que piensan distinto, de los que ven llegar el futuro antes que el resto. Transforma lo denso en sutil, lo ordinario en visión. No podía ser otra tu piedra: naciste bajo el signo del arquitecto del futuro, y tu cuarzo vibra en la frecuencia de lo que viene. Llevarla cerca del corazón es un recordatorio de tu naturaleza: tu diferencia no es error — es antena."}, "cristal_de_roca": {"nombre": "Cristal de Roca", "signo": "piscis", "texto": "Tu piedra es el Cristal de Roca — la piedra de la pureza total. Es el cuarzo en su forma más esencial: transparente, receptivo, capaz de contener toda la luz sin quedarse con ninguna. Desde la antigüedad se le considera amplificador de lo sutil: los videntes miraban a través de él, los sanadores lo usaban como canal. Su leve tono azulado es agua congelada en el tiempo — océano hecho cristal. No podía ser otra tu piedra: naciste bajo el signo del místico, y tu cuarzo, como tú, es puente entre lo visible y lo invisible. Llevarla cerca del corazón es un recordatorio de tu naturaleza: tu transparencia no es vacío — es capacidad infinita de recibir y devolver luz."}}, "cuarzos_eleccion": {"cuarzo_rojo": {"nombre": "Cuarzo Rojo / Cornalina", "texto": "Pero tú elegiste el Cuarzo Rojo — y elegir una piedra es declarar qué energía quieres invocar en este ciclo. Elegiste la piedra del fuego y la acción: la que los guerreros llevaban al combate para despertar el coraje dormido. Quien la elige no está pidiendo calma — está pidiendo brasa: vitalidad, arranque, la fuerza de dar el primer paso que se ha postergado demasiado. Tu signo te dio {raiz}, pero tu voluntad pidió fuego. Llevarla cerca del corazón es llevar tu declaración puesta: en este ciclo, eliges actuar. Eliges comenzar. Eliges arder."}, "aventurina": {"nombre": "Cuarzo Verde / Aventurina", "texto": "Pero tú elegiste la Aventurina — y elegir una piedra es declarar qué energía quieres invocar en este ciclo. Elegiste la piedra de la abundancia y la fortuna que florece: la que los antiguos llamaban piedra de la oportunidad. Quien la elige no está pidiendo suerte — está pidiendo fertilidad: que lo sembrado dé fruto, que lo trabajado prospere, que la vida entre en temporada de crecimiento. Tu signo te dio {raiz}, pero tu voluntad pidió primavera. Llevarla cerca del corazón es llevar tu declaración puesta: en este ciclo, eliges crecer. Eliges prosperar. Eliges florecer."}, "agata": {"nombre": "Ágata", "texto": "Pero tú elegiste el Ágata — y elegir una piedra es declarar qué energía quieres invocar en este ciclo. Elegiste la piedra de las mil capas: la que se formó banda sobre banda durante milenios, y por eso conoce el arte de integrar lo diverso. Quien la elige no está pidiendo simpleza — está pidiendo equilibrio: reconciliar las propias contradicciones, encontrar claridad en la palabra, armonizar las voces internas. Tu signo te dio {raiz}, pero tu voluntad pidió integración. Llevarla cerca del corazón es llevar tu declaración puesta: en este ciclo, eliges escucharte completo. Eliges tus matices. Eliges la armonía de todo lo que eres."}, "cuarzo_lechoso": {"nombre": "Cuarzo Lechoso", "texto": "Pero tú elegiste el Cuarzo Lechoso — y elegir una piedra es declarar qué energía quieres invocar en este ciclo. Elegiste la piedra de la luz suave: la de la calma, el refugio y la nutrición del alma. Quien la elige no está pidiendo intensidad — está pidiendo paz: bajar el ruido, volver al centro, construir un hogar interior donde descansar de tanto mundo. Tu signo te dio {raiz}, pero tu voluntad pidió serenidad. Llevarla cerca del corazón es llevar tu declaración puesta: en este ciclo, eliges la calma. Eliges cuidarte. Eliges volver a casa — a ti."}, "ojo_de_tigre": {"nombre": "Ojo de Tigre", "texto": "Pero tú elegiste el Ojo de Tigre — y elegir una piedra es declarar qué energía quieres invocar en este ciclo. Elegiste la piedra de la mirada dorada: la del coraje que ve con claridad antes de actuar. Quien la elige no está pidiendo brillo prestado — está pidiendo confianza: pararse firme en su propio valor, sostener la mirada, dejar de pedir permiso para ocupar su lugar. Tu signo te dio {raiz}, pero tu voluntad pidió sol. Llevarla cerca del corazón es llevar tu declaración puesta: en este ciclo, eliges creer en ti. Eliges mostrarte. Eliges brillar."}, "jaspe": {"nombre": "Jaspe", "texto": "Pero tú elegiste el Jaspe — y elegir una piedra es declarar qué energía quieres invocar en este ciclo. Elegiste la piedra del cuidado terrenal: la nutridora suprema, compañera de sanadores y de procesos lentos. Quien la elige no está pidiendo espectáculo — está pidiendo constancia: orden en lo disperso, salud en lo desgastado, paciencia para los caminos que se cultivan día a día. Tu signo te dio {raiz}, pero tu voluntad pidió tierra firme. Llevarla cerca del corazón es llevar tu declaración puesta: en este ciclo, eliges lo esencial. Eliges cuidar y cuidarte. Eliges lo que perdura."}, "cuarzo_rosa": {"nombre": "Cuarzo Rosa", "texto": "Pero tú elegiste el Cuarzo Rosa — y elegir una piedra es declarar qué energía quieres invocar en este ciclo. Elegiste la piedra del corazón abierto: la del amor en todas sus formas — el que se da, el que se recibe, y el más difícil: el propio. Quien la elige no está pidiendo romance — está pidiendo apertura: sanar viejas heridas del afecto, suavizar lo que se endureció, dejar entrar la ternura otra vez. Tu signo te dio {raiz}, pero tu voluntad pidió amor. Llevarla cerca del corazón es llevar tu declaración puesta: en este ciclo, eliges abrirte. Eliges perdonar. Eliges amar — empezando por ti."}, "cuarzo_ahumado": {"nombre": "Cuarzo Ahumado", "texto": "Pero tú elegiste el Cuarzo Ahumado — y elegir una piedra es declarar qué energía quieres invocar en este ciclo. Elegiste la piedra de la sombra transmutada: la que atravesó el fuego de la tierra y salió más bella. Quien la elige no está pidiendo ligereza — está pidiendo transformación: soltar lo que pesa, cerrar lo que quedó abierto, convertir lo vivido — incluso lo oscuro — en fuerza. Tu signo te dio {raiz}, pero tu voluntad pidió alquimia. Llevarla cerca del corazón es llevar tu declaración puesta: en este ciclo, eliges soltar. Eliges transmutar. Eliges salir de la sombra con oro en las manos."}, "aventurina_azul": {"nombre": "Aventurina Azul", "texto": "Pero tú elegiste la Aventurina Azul — y elegir una piedra es declarar qué energía quieres invocar en este ciclo. Elegiste la piedra del horizonte: la del cielo abierto, la verdad dicha con claridad y la visión que apunta lejos. Quien la elige no está pidiendo quietud — está pidiendo expansión: nuevos caminos, nuevos aprendizajes, el valor de mirar más allá de lo conocido. Tu signo te dio {raiz}, pero tu voluntad pidió cielo. Llevarla cerca del corazón es llevar tu declaración puesta: en este ciclo, eliges avanzar. Eliges tu verdad. Eliges el horizonte."}, "onix": {"nombre": "Ónix", "texto": "Pero tú elegiste el Ónix — y elegir una piedra es declarar qué energía quieres invocar en este ciclo. Elegiste la piedra negra de la fortaleza serena: la que absorbe lo que pesa para que tú no lo cargues. Quien la elige no está pidiendo suavidad — está pidiendo firmeza: protección en tiempos de exposición, anclaje en tiempos de cambio, la solidez del que necesita mantenerse en pie pase lo que pase. Tu signo te dio {raiz}, pero tu voluntad pidió montaña. Llevarla cerca del corazón es llevar tu declaración puesta: en este ciclo, eliges resistir. Eliges tu centro. Eliges permanecer."}, "amatista": {"nombre": "Amatista", "texto": "Pero tú elegiste la Amatista — y elegir una piedra es declarar qué energía quieres invocar en este ciclo. Elegiste la piedra de la mente elevada: la del violeta sagrado, la que protege la claridad de la conciencia y abre la percepción. Quien la elige no está pidiendo ruido — está pidiendo visión: intuición más fina, sueños más nítidos, conexión con lo que aún no tiene forma pero ya se siente venir. Tu signo te dio {raiz}, pero tu voluntad pidió altura. Llevarla cerca del corazón es llevar tu declaración puesta: en este ciclo, eliges ver más allá. Eliges tu intuición. Eliges despertar."}, "cristal_de_roca": {"nombre": "Cristal de Roca", "texto": "Pero tú elegiste el Cristal de Roca — y elegir una piedra es declarar qué energía quieres invocar en este ciclo. Elegiste la piedra de la pureza total: el cuarzo esencial, transparente, capaz de recibir toda la luz sin quedarse con ninguna. Quien la elige no está pidiendo una energía específica — está pidiendo claridad: limpiar lo confuso, amplificar lo verdadero, volver al punto de partida donde todo es posible otra vez. Tu signo te dio {raiz}, pero tu voluntad pidió luz. Llevarla cerca del corazón es llevar tu declaración puesta: en este ciclo, eliges la claridad. Eliges empezar limpio. Eliges la luz."}}, "transiciones_raiz": {"cuarzo_rojo": {"frase": "la brasa", "signo": "aries", "eco": "el fuego del comienzo"}, "aventurina": {"frase": "la semilla", "signo": "tauro", "eco": "la abundancia que florece"}, "agata": {"frase": "las mil voces", "signo": "geminis", "eco": "las capas de la multiplicidad"}, "cuarzo_lechoso": {"frase": "el abrazo", "signo": "cancer", "eco": "la luz suave del refugio"}, "ojo_de_tigre": {"frase": "la luz propia", "signo": "leo", "eco": "el brillo que nace adentro"}, "jaspe": {"frase": "la constancia", "signo": "virgo", "eco": "el cuidado de los detalles"}, "cuarzo_rosa": {"frase": "el tratado de paz", "signo": "libra", "eco": "la armonía del corazón"}, "cuarzo_ahumado": {"frase": "la profundidad", "signo": "escorpio", "eco": "la sombra hecha belleza"}, "aventurina_azul": {"frase": "el horizonte", "signo": "sagitario", "eco": "el cielo por recorrer"}, "onix": {"frase": "el cimiento", "signo": "capricornio", "eco": "la fortaleza que sostiene"}, "amatista": {"frase": "la antena", "signo": "acuario", "eco": "la visión de lo que viene"}, "cristal_de_roca": {"frase": "la transparencia", "signo": "piscis", "eco": "el puente entre los mundos"}}};

  var REV_ABREV = {
    ROJ:'cuarzo_rojo', AVT:'aventurina', AGT:'agata', LEC:'cuarzo_lechoso',
    TIG:'ojo_de_tigre', JAS:'jaspe', ROS:'cuarzo_rosa', AHU:'cuarzo_ahumado',
    AZU:'aventurina_azul', ONX:'onix', AMT:'amatista', CRI:'cristal_de_roca'
  };

  var SIGNO_RANGOS = [
    {signo:'capricornio', from:[12,22], to:[1,19]},
    {signo:'acuario', from:[1,20], to:[2,18]},
    {signo:'piscis', from:[2,19], to:[3,20]},
    {signo:'aries', from:[3,21], to:[4,19]},
    {signo:'tauro', from:[4,20], to:[5,20]},
    {signo:'geminis', from:[5,21], to:[6,20]},
    {signo:'cancer', from:[6,21], to:[7,22]},
    {signo:'leo', from:[7,23], to:[8,22]},
    {signo:'virgo', from:[8,23], to:[9,22]},
    {signo:'libra', from:[9,23], to:[10,22]},
    {signo:'escorpio', from:[10,23], to:[11,21]},
    {signo:'sagitario', from:[11,22], to:[12,21]}
  ];
  function toNum(m,d){return m*100+d;}
  function inRango(m,d,from,to){
    var v=toNum(m,d), f=toNum(from[0],from[1]), t=toNum(to[0],to[1]);
    if(f<=t) return v>=f && v<=t;
    return v>=f || v<=t;
  }
  function getSigno(m,d){
    for(var i=0;i<SIGNO_RANGOS.length;i++){ if(inRango(m,d,SIGNO_RANGOS[i].from,SIGNO_RANGOS[i].to)) return SIGNO_RANGOS[i].signo; }
    return null;
  }
  function digitSum(s){var t=0; for(var i=0;i<s.length;i++){ t+=Number(s[i]); } return t;}
  function lifePath(d,m,y){
    var sum = digitSum(String(d)+String(m)+String(y));
    while(sum>9 && sum!==11 && sum!==22 && sum!==33){ sum = digitSum(String(sum)); }
    return sum;
  }
  function parseCodigo(codigo){
    var m = codigo.trim().toUpperCase().match(/^NAAB-([A-Z]{3})-(\d{3,4})$/);
    if(!m) return null;
    var cuarzoKey = REV_ABREV[m[1]];
    if(!cuarzoKey) return null;
    return cuarzoKey;
  }

  function buildCarta(nombreDisplay, fecha, esencia, cuarzoPieza){
    var partes = fecha.split('-').map(Number);
    var y=partes[0], m=partes[1], d=partes[2];
    var signo = getSigno(m,d);
    var numero = lifePath(d,m,y);
    var sufijo = esencia==='masculina' ? '_m' : '_f';
    var elementoKey = NAAB_DATA.signo_elemento[signo] + sufijo;
    var arquetipoKey = signo + sufijo;
    var cuarzoSigno = NAAB_DATA.signo_cuarzo[signo];
    var ruta = (cuarzoPieza === cuarzoSigno) ? 'A' : 'B';

    var bloques = [];
    bloques.push({eyebrow:'Número', titulo: NAAB_DATA.numeros[String(numero)].titulo, texto: NAAB_DATA.numeros[String(numero)].texto});
    bloques.push({eyebrow:'Signo solar', titulo: NAAB_DATA.signos[signo].nombre, texto: NAAB_DATA.signos[signo].texto});
    bloques.push({eyebrow:'Elemento', titulo: NAAB_DATA.elementos[elementoKey].nombre, texto: NAAB_DATA.elementos[elementoKey].texto});
    bloques.push({eyebrow:'Arquetipo', titulo: NAAB_DATA.arquetipos[arquetipoKey].nombre, texto: NAAB_DATA.arquetipos[arquetipoKey].texto});

    var corresp = NAAB_DATA.cuarzos_correspondencia[cuarzoSigno];
    bloques.push({eyebrow: ruta==='A' ? 'Tu cuarzo' : 'Cuarzo de correspondencia', titulo: corresp.nombre, texto: corresp.texto});

    if(ruta==='B'){
      var raiz = NAAB_DATA.transiciones_raiz[cuarzoSigno].frase;
      var eleccionBlock = NAAB_DATA.cuarzos_eleccion[cuarzoPieza];
      var texto = eleccionBlock.texto.split('{raiz}').join(raiz);
      bloques.push({eyebrow:'Cuarzo elegido', titulo: eleccionBlock.nombre, texto: texto, eleccion:true});
    }
    return {signo:signo, numero:numero, ruta:ruta, bloques:bloques, nombreDisplay:nombreDisplay, fecha:fecha};
  }

  function cartaTextoPlano(carta){
    var signoNombre = NAAB_DATA.signos[carta.signo].nombre;
    var out = 'Tu carta NAAB — ' + carta.nombreDisplay + '\n' + signoNombre + ' · Ruta ' + carta.ruta + '\n\n';
    carta.bloques.forEach(function(b){ out += b.eyebrow.toUpperCase() + ': ' + b.titulo + '\n' + b.texto + '\n\n'; });
    return out;
  }

  function renderCarta(carta){
    var signoNombre = NAAB_DATA.signos[carta.signo].nombre;
    var fechaFmt = new Date(carta.fecha+'T00:00:00').toLocaleDateString('es-MX',{day:'numeric',month:'long',year:'numeric'});
    var holder = document.getElementById('r-carta');
    var bloquesHtml = carta.bloques.map(function(b){
      return '<div class="carta-bloque ' + (b.eleccion?'eleccion':'') + '">' +
        '<p class="eyebrow">' + b.eyebrow + '</p>' +
        '<h3>' + b.titulo + '</h3>' +
        '<p>' + b.texto + '</p></div>';
    }).join('');

    holder.innerHTML =
      '<div class="carta revelar visible" id="carta-imprimible">' +
        '<div class="carta-hero">' +
          '<svg id="torus-carta" viewBox="-70 -70 140 140" fill="none" stroke="currentColor" stroke-width="1" aria-hidden="true"></svg>' +
          '<div class="carta-nombre">' + carta.nombreDisplay + '</div>' +
          '<div class="carta-meta">' + signoNombre + ' · ' + fechaFmt + '</div>' +
        '</div>' +
        '<div class="carta-cuerpo">' + bloquesHtml + '</div>' +
        '<div class="carta-acciones">' +
          '<button type="button" class="accion-btn primaria" id="btn-pdf">Descargar como PDF</button>' +
          '<a class="accion-btn" id="btn-whatsapp" target="_blank" rel="noopener">Enviar por WhatsApp</a>' +
          '<a class="accion-btn" id="btn-correo">Enviar por correo</a>' +
        '</div>' +
      '</div>';

    dibujarTorus('torus-carta', 12, 58, 21);
    document.getElementById('btn-pdf').addEventListener('click', function(){ window.print(); });

    var texto = cartaTextoPlano(carta);
    document.getElementById('btn-whatsapp').href = 'https://wa.me/?text=' + encodeURIComponent(texto);
    document.getElementById('btn-correo').href = 'mailto:?subject=' + encodeURIComponent('Tu carta NAAB') + '&body=' + encodeURIComponent(texto);

    holder.scrollIntoView({behavior:'smooth', block:'start'});
  }

  var esenciaSel = 'femenina';
  document.querySelectorAll('.esencia-btn').forEach(function(btn){
    btn.addEventListener('click', function(){
      document.querySelectorAll('.esencia-btn').forEach(function(b){ b.classList.remove('activa'); });
      btn.classList.add('activa');
      esenciaSel = btn.dataset.esencia;
    });
  });

  var forma = document.getElementById('forma-registro');
  var msg = document.getElementById('r-msg');
  var submitBtn = document.getElementById('r-submit');

  forma.addEventListener('submit', function(e){
    e.preventDefault();
    msg.hidden = true;

    var codigo = document.getElementById('r-codigo').value;
    var nombre = document.getElementById('r-nombre').value.trim();
    var apellidos = document.getElementById('r-apellidos').value.trim();
    var fecha = document.getElementById('r-fecha').value;
    var correo = document.getElementById('r-correo').value.trim();
    var telefono = document.getElementById('r-telefono').value.trim();

    var cuarzoPieza = parseCodigo(codigo);
    if(!cuarzoPieza){
      msg.hidden = false; msg.className = 'registro-msg err';
      msg.textContent = 'No reconocemos ese código. Revisa que tenga el formato NAAB-XXX-0000 tal como aparece en tu pieza.';
      return;
    }
    if(!nombre || !apellidos || !fecha || !correo || !telefono){
      msg.hidden = false; msg.className = 'registro-msg err';
      msg.textContent = 'Completa todos los campos para generar tu carta.';
      return;
    }

    submitBtn.disabled = true;
    submitBtn.textContent = 'Generando…';

    // Guarda el registro en Formspree para el seguimiento comercial.
    // Reemplaza https://formspree.io/f/xnjevkze por tu endpoint real (crea un formulario
    // nuevo en formspree.io llamado "Registro de dije", separado del de la lista de espera).
    fetch('https://formspree.io/f/xnjevkze', {
      method: 'POST',
      headers: {'Accept': 'application/json'},
      body: new FormData(forma)
    }).catch(function(err){ console.error('No se pudo enviar el registro a Formspree', err); });

    var carta = buildCarta(nombre + ' ' + apellidos, fecha, esenciaSel, cuarzoPieza);
    renderCarta(carta);

    submitBtn.disabled = false;
    submitBtn.textContent = 'Generar mi carta';
  });
})();
</script>
